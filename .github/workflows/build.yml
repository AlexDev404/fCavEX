name: Build Wii Homebrew

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build fCavEX for Wii
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch third-party dependencies
        run: |
          git clone --depth 1 https://github.com/FliPPeh/cNBT.git         source/cNBT
          git clone --depth 1 https://github.com/lvandeve/lodepng.git     source/lodepng
          git clone --depth 1 https://github.com/kgabis/parson.git        source/parson
          git clone --depth 1 https://github.com/recp/cglm.git            /tmp/cglm
          git clone --depth 1 https://github.com/P-p-H-d/mlib.git         /tmp/mlib

          # cNBT ships a main_test.c that would collide with source/main.c at link time
          rm -f source/cNBT/main_test.c

          # lodepng ships benchmark/fuzzer/unittest/pngdetail .cpp files the Makefile would pick up
          find source/lodepng -mindepth 1 -maxdepth 1 \
            ! -name 'lodepng.c' ! -name 'lodepng.h' -exec rm -rf {} +

          # cglm is header-only; the source includes it as "cglm/cglm.h" relative to source/
          mkdir -p source/cglm
          cp -r /tmp/cglm/include/cglm/. source/cglm/

          # M*LIB headers are included as <m-lib/m-array.h> etc.; install into portlibs so -I resolves them
          mkdir -p "$DEVKITPRO/portlibs/ppc/include/m-lib"
          cp /tmp/mlib/m-*.h "$DEVKITPRO/portlibs/ppc/include/m-lib/"

      - name: Build fCavEX.dol
        run: make -j"$(nproc)"

      - name: Stage homebrew package
        run: |
          mkdir -p dist/fCavEX
          cp fCavEX.dol      dist/fCavEX/boot.dol
          cp meta.xml        dist/fCavEX/meta.xml
          cp icon.png        dist/fCavEX/icon.png
          cp config_wii.json dist/fCavEX/config.json
          cp -r assets       dist/fCavEX/assets

      - name: Create homebrew zip
        run: |
          cd dist/fCavEX
          zip -r ../fCavEX.zip .

      - name: Upload homebrew zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: fCavEX-homebrew
          path: dist/fCavEX.zip
          if-no-files-found: error
